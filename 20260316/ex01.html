        document.getElementById('add').onclick = function () {
            var xxx = document.getElementById("aaa").value;
            console.log(xxx);
            var yyy = document.getElementById("bbb").value;
            console.log(yyy);
            console.log(Number(xxx)+Number(yyy));

            document.getElementById('qwe').textContent = Number(xxx)/Number(yyy);

        }
